<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Experiment 5 - Employee System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2>Employee Management System</h2>

  <input type="text" id="name" placeholder="Employee Name">
  <input type="number" id="empId" placeholder="Employee ID">
  <input type="number" id="salary" placeholder="Salary">
  <input type="text" id="department" placeholder="Department">

  <button onclick="addEmployee()">Add Employee</button>

  <hr>

  <button onclick="displayAll()">Display All</button>
  <button onclick="filterSalary()">Salary > 50000</button>
  <button onclick="totalSalary()">Total Salary</button>
  <button onclick="averageSalary()">Average Salary</button>

  <input type="text" id="deptSearch" placeholder="Enter Department">
  <button onclick="countDepartment()">Count Department</button>

  <div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
